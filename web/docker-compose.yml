services:
  postgres:
    image: postgres:16
    container_name: keepsave-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: keepsave
      POSTGRES_PASSWORD: keepsave_password
      POSTGRES_DB: keepsave_dev
    ports:
      - "5434:5432"
    volumes:
      - keepsave_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keepsave -d keepsave_dev"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  keepsave_postgres_data: